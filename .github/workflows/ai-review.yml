name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Build review prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python <<'PY'
          import json
          import os
          import subprocess
          import urllib.request

          pr_number = os.environ['PR_NUMBER']
          repo = os.environ['REPO']
          token = os.environ['GITHUB_TOKEN']

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files",
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          with urllib.request.urlopen(req) as resp:
              files = json.load(resp)

          summary = []
          for f in files:
              summary.append({
                  'filename': f.get('filename'),
                  'status': f.get('status'),
                  'additions': f.get('additions'),
                  'deletions': f.get('deletions'),
                  'changes': f.get('changes'),
                  'patch': f.get('patch', ''),
              })

          repo_tree = subprocess.check_output(
              ['bash', '-lc', "find . -maxdepth 3 -type f | sed 's#^./##' | sort"],
              text=True,
          )

          def read_if_exists(path):
              if os.path.exists(path):
                  with open(path, 'r', encoding='utf-8', errors='replace') as f:
                      return f.read()
              return ''

          prompt = f"""
          You are a strict AI code reviewer.

          Review the pull request using the repository context and the changed-file patches.
          Focus on real, actionable issues only.

          Repository file list:
          {repo_tree}

          Repository guidance files:

          [REVIEW.md]
          {read_if_exists('REVIEW.md')}

          [CLAUDE.md]
          {read_if_exists('CLAUDE.md')}

          [docs/REQUIREMENTS.md]
          {read_if_exists('docs/REQUIREMENTS.md')}

          [docs/SPECIFICATIONS.md]
          {read_if_exists('docs/SPECIFICATIONS.md')}

          Changed files JSON:
          {json.dumps(summary, ensure_ascii=False, indent=2)}
          """.strip()

          with open('review_prompt.txt', 'w', encoding='utf-8') as f:
              f.write(prompt)
          PY

      - name: Call Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python <<'PY'
          import os
          import requests
          import sys

          api_key = os.environ.get('GEMINI_API_KEY')
          if not api_key:
              print('GEMINI_API_KEY is not set. Add it in GitHub repo Settings -> Secrets and variables -> Actions.')
              sys.exit(1)

          with open('review_prompt.txt', 'r', encoding='utf-8') as f:
              prompt = f.read()

          model = os.environ.get('GEMINI_MODEL', 'gemini-2.5-flash')
          url = (
              'https://generativelanguage.googleapis.com/v1beta/models/'
              f'{model}:generateContent'
          )
          response = requests.post(
              url,
              params={'key': api_key},
              headers={'Content-Type': 'application/json'},
              json={
                  'contents': [
                      {
                          'parts': [
                              {'text': prompt}
                          ]
                      }
                  ],
                  'generationConfig': {
                      'temperature': 0.2,
                      'maxOutputTokens': 2600,
                  },
              },
              timeout=120,
          )
          if not response.ok:
              print('Gemini API error:')
              print(response.status_code)
              print(response.text)
              response.raise_for_status()
          data = response.json()
          text = data['candidates'][0]['content']['parts'][0]['text']

          body = "## AI Review\n\n" + text.strip()
          with open('review_comment.md', 'w', encoding='utf-8') as f:
              f.write(body)
          PY

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review_comment.md', 'utf8');
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
